<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit shop product">
    <meta name="author" content="George Kioutas">
    <title>Fish The.Box / Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

    <link rel="stylesheet" href="{% static 'shop/shop.css' %}">
    <link rel="stylesheet" href="{% static 'DarkMode/DarkMode.css' %}">
    <script>
        const userIsLoggedIn = "{{ user.is_authenticated }}";
        const userCanManageProducts = "{{ request.session.can_manage_products }}";
    </script>
    <script src="{% static 'OtherScripts/Navbar/navbar.js' %}?v=2" defer></script>
    <script src="{% static 'DarkMode/Darkmode.js' %}" defer></script>
</head>
<body>
    <header class="bg-info text-white sticky-top">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <img src="{% static 'shop/logo.png' %}" alt="Fish The.Box logo" width="150" height="120">
                <div id="navbar"></div>
            </div>
        </div>
    </header>

    <main class="shop-main">
        <section class="shop-section py-5">
            <div class="container">
                <h1 class="text-center fw-bold mb-2">Edit Product</h1>
                <p class="text-center mb-4">{{ product.name }}</p>

                <div class="category-content-panel">
                    {% if product.photo %}
                        <div class="text-center mb-4">
                            <p class="fw-bold mb-2">Current Product Photo</p>
                            <img src="{% static product.photo %}" alt="{{ product.name }}" class="edit-product-photo">
                        </div>
                    {% endif %}

                    <!-- This form saves changes for one product -->
                    <!-- enctype lets the form send the uploaded product photo -->
                    <form action="{% url 'shop:edit_product' %}" method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <input type="hidden" name="product_id" value="{{ product.id }}">
                        {{ form }}

                        <div class="mt-4">
                            <button type="submit" class="btn btn-info">Save Changes</button>
                            <a href="{% url 'shop:manage_products' %}" class="btn btn-secondary">Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-light text-dark py-4">
        <div class="container d-flex justify-content-between align-items-center flex-wrap gap-4">
            <img src="{% static 'shop/logo.png' %}" alt="Fish The.Box logo" width="100" height="80">
            <p class="mb-0">&copy; 2026 Fish The.Box. All rights reserved.</p>
            <p class="mb-0">Email: <a href="mailto:fishthebox@example.com">fishthebox@example.com</a></p>
            <div class="d-flex gap-3 fs-3">
                <a href="https://github.com/G1org0s/Final-Assesment-Internet-Programming.git" aria-label="GitHub">
                    <i class="bi bi-github"></i>
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
