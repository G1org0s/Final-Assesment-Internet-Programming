<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add shop sub category">
    <meta name="author" content="George Kioutas">
    <title>Fish The.Box / Add Sub Category</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

    <link rel="stylesheet" href="{% static 'shop/shop.css' %}">
    <link rel="stylesheet" href="{% static 'DarkMode/DarkMode.css' %}">
    <script>
        const userIsLoggedIn = "{{ user.is_authenticated }}";
        const userCanManageProducts = "{{ request.session.can_manage_products }}";
    </script>
    <script src="{% static 'OtherScripts/Navbar/navbar.js' %}?v=3" defer></script>
    <script src="{% static 'OtherScripts/Footer/footer.js' %}" defer></script>
    <script src="{% static 'DarkMode/Darkmode.js' %}" defer></script>
</head>
<body>
    <header class="bg-info text-white sticky-top">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <img src="{% static 'shop/logo.png' %}" alt="Fish The.Box logo" width="150" height="120">
                <div id="navbar"></div>
            </div>
        </div>
    </header>

    <main class="shop-main">
        <section class="shop-section py-5">
            <div class="container">
                <h1 class="text-center fw-bold mb-4">Add Sub Category</h1>

                <div class="category-content-panel">
                    <!-- This form adds one sub category to the database -->
                    <form action="{% url 'shop:add_sub_category' %}" method="post">
                        {% csrf_token %}
                        {{ form }}

                        <div class="mt-4">
                            <button type="submit" class="btn btn-info">Save Sub Category</button>
                            <a href="{% url 'shop:manage_products' %}" class="btn btn-secondary">Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>
</body>
</html>
