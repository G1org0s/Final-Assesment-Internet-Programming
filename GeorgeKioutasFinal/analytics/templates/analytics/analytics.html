<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Completed fishing trip analytics">
    <meta name="author" content="George Kioutas">
    <title>Fish The.Box / Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <link rel="stylesheet" href="{% static 'analytics/analytics.css' %}">
    <link rel="stylesheet" href="{% static 'DarkMode/DarkMode.css' %}">
    <script>
        const userIsLoggedIn = "{{ user.is_authenticated }}";
    </script>
    <script src="{% static 'OtherScripts/Navbar/navbar.js' %}?v=8" defer></script>
    <script src="{% static 'DarkMode/Darkmode.js' %}" defer></script>
    <script src="{% static 'analytics/analytics.js' %}" defer></script>
</head>
<body>
    <header class="bg-info text-white sticky-top">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <img src="{% static 'analytics/logo.png' %}" alt="Fish The.Box logo" width="150" height="120">

                <div id="navbar"></div>
            </div>
        </div>
    </header>

    <main>
        <section class="analytics-section py-5">
            <div class="container">
                <h1 class="text-center fw-bold mb-2">Completed Trips</h1>

                <p class="text-center mb-4">
                    Trips with the same name are grouped into one pie-chart slice.
                </p>

                <div class="chart-card card shadow p-4 mx-auto">
                    <p id="completedTripsTotal" class="text-center fw-bold"></p>

                    <canvas id="completedTripsChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-light text-dark py-4">
        <div class="container d-flex justify-content-between align-items-center flex-wrap gap-4">
            <img src="{% static 'analytics/logo.png' %}" alt="Fish The.Box logo" width="100" height="80">

            <p class="mb-0">&copy; 2026 Fish The.Box. All rights reserved.</p>

            <p class="mb-0">
                Email:
                <a href="mailto:fishthebox@example.com">fishthebox@example.com</a>
            </p>

            <div class="d-flex gap-3 fs-3">
                <a href="https://github.com/G1org0s/Final-Assesment-Internet-Programming.git" aria-label="GitHub">
                    <i class="bi bi-github"></i>
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
