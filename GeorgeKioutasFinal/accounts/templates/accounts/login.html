<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Fish The.Box">
    <meta name="author" content="George Kioutas">
    <title>Fish The.Box / Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

    <link rel="stylesheet" href="{% static 'accounts/accounts.css' %}">
    <link rel="stylesheet" href="{% static 'DarkMode/DarkMode.css' %}?v=2">
    <script>
        const userIsLoggedIn = "{{ user.is_authenticated }}";
        const userCanManageProducts = "{{ request.session.can_manage_products }}";
    </script>
    <script src="{% static 'OtherScripts/Navbar/navbar.js' %}?v=3" defer></script>
    <script src="{% static 'OtherScripts/Footer/footer.js' %}" defer></script>
    <script src="{% static 'DarkMode/Darkmode.js' %}" defer></script>
</head>
<body>
    <header class="bg-info text-white sticky-top">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <img src="{% static 'shop/logo.png' %}" alt="Fish The.Box logo" width="150" height="120">
                <div id="navbar"></div>
            </div>
        </div>
    </header>

    <main>
        <section class="accounts-section py-5">
            <div class="container">
                <div class="account-card">
                    <h1 class="h3 fw-bold text-center mb-4">Login</h1>

                    {% if message %}
                        <p class="text-danger text-center fw-bold">{{ message }}</p>
                    {% endif %}

                    <!-- This form checks the username and password. -->
                    <form action="{% url 'accounts:login' %}" method="post">
                        {% csrf_token %}
                        {{ form }}

                        <button type="submit" class="btn btn-info mt-3">Login</button>
                    </form>

                    <p class="text-center mt-3 mb-0">
                        Do not have an account?
                        <a href="{% url 'accounts:register' %}">Create account</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>
</body>
</html>
