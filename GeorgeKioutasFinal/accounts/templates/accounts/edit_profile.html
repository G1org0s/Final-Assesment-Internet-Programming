<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit Fish The.Box profile">
    <meta name="author" content="George Kioutas">
    <title>Fish The.Box / Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

    <link rel="stylesheet" href="{% static 'accounts/accounts.css' %}">
    <link rel="stylesheet" href="{% static 'DarkMode/DarkMode.css' %}?v=2">
    <script>
        const userIsLoggedIn = "{{ user.is_authenticated }}";
        const userCanManageProducts = "{{ request.session.can_manage_products }}";
    </script>
    <script src="{% static 'OtherScripts/Navbar/navbar.js' %}" defer></script>
    <script src="{% static 'DarkMode/Darkmode.js' %}" defer></script>
</head>
<body>
    <header class="bg-info text-white sticky-top">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <img src="{% static 'shop/logo.png' %}" alt="Fish The.Box logo" width="150" height="120">
                <div id="navbar"></div>
            </div>
        </div>
    </header>

    <main>
        <section class="accounts-section py-5">
            <div class="container">
                <div class="account-card">
                    <h1 class="h3 fw-bold text-center mb-4">Edit Profile</h1>

                    <!-- This form updates only the simple profile fields. -->
                    <form action="{% url 'accounts:edit_profile' %}" method="post">
                        {% csrf_token %}
                        {{ form }}

                        <button type="submit" class="btn btn-info mt-3">Save Profile</button>
                        <a href="{% url 'accounts:profile' %}" class="btn btn-secondary mt-3">Cancel</a>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-light text-dark py-4">
        <div class="container d-flex justify-content-between align-items-center flex-wrap gap-4">
            <img src="{% static 'shop/logo.png' %}" alt="Fish The.Box logo" width="100" height="80">
            <p class="mb-0">&copy; 2026 Fish The.Box. All rights reserved.</p>
            <p class="mb-0">Email: <a href="mailto:fishthebox@example.com">fishthebox@example.com</a></p>
            <div class="d-flex gap-3 fs-3">
                <a href="https://github.com/G1org0s/Final-Assesment-Internet-Programming.git" aria-label="GitHub">
                    <i class="bi bi-github"></i>
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
