<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Share a review about a fishing trip">
    <meta name="author" content="George Kioutas">
    <title>Fish The.Box / Reviews</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

    <link rel="stylesheet" href="{% static 'reviews/reviews.css' %}">
    <link rel="stylesheet" href="{% static 'DarkMode/DarkMode.css' %}">
    <script src="{% static 'OtherScripts/Navbar/navbar.js' %}" defer></script>
    <script src="{% static 'DarkMode/Darkmode.js' %}" defer></script>
    <script src="{% static 'reviews/reviews.js' %}" defer></script>
</head>
<body>
    <header class="bg-info text-white sticky-top">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <img src="{% static 'reviews/logo.png' %}" alt="Fish The.Box logo" width="150" height="120">
                <div id="navbar"></div>
            </div>
        </div>
    </header>

    <main>
        <section class="reviews-section py-5">
            <div class="container">
                <h1 class="text-center fw-bold mb-2">Fishing Trip Reviews</h1>
                <p class="text-center mb-4">Share your fishing experience and help other anglers.</p>

                <div class="row g-4">
                    <div class="col-12">
                        <div class="card shadow p-4 h-100">
                            <h2 class="h4 fw-bold mb-4">Write a Review</h2>

                            <form id="reviewForm">
                                <div class="mb-3">
                                    <label for="reviewName" class="form-label">Name</label>
                                    <input type="text" id="reviewName" class="form-control" placeholder="Enter your name" minlength="2" maxlength="30" required>
                                </div>

                                <div class="mb-3">
                                    <label for="reviewLocation" class="form-label">Location</label>
                                    <input type="text" id="reviewLocation" class="form-control" placeholder="Ex. Pylos" minlength="2" maxlength="30" required>
                                </div>

                                <div class="mb-3">
                                    <label for="fishCaught" class="form-label">Fish Caught</label>
                                    <input type="text" id="fishCaught" class="form-control" placeholder="Ex. Sea bream" maxlength="80" required>
                                </div>

                                <div class="mb-3">
                                    <label for="reviewMessage" class="form-label">Message</label>
                                    <textarea id="reviewMessage" class="form-control" rows="5" placeholder="Max. 200 characters" minlength="10" maxlength="200" required></textarea>
                                </div>

                                <div class="mb-4">
                                    <label for="recommendTrip" class="form-label">Would you recommend this location?</label>
                                    <select id="recommendTrip" class="form-select" required>
                                        <option value="">Choose an answer</option>
                                        <option value="Yes">Yes</option>
                                        <option value="No">No</option>
                                    </select>
                                </div>

                                <button type="submit" class="btn btn-info w-100">Submit Review</button>
                            </form>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="card shadow p-4 h-100">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h2 class="h4 fw-bold mb-0">Saved Reviews</h2>
                                <button type="button" id="clearReviews" class="btn btn-danger btn-sm">Clear Reviews</button>
                            </div>

                            <div id="reviewsList" class="table-responsive">
                                <p id="noReviewsMessage">No reviews have been submitted yet.</p>

                                <table class="table table-bordered">
                                    <thead class="table-info">
                                        <tr>
                                            <th>Name</th>
                                            <th>Location</th>
                                            <th>Fish</th>
                                            <th>Message</th>
                                            <th>Recommend</th>
                                        </tr>
                                    </thead>
                                    <tbody id="reviewsTable"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-light text-dark py-4">
        <div class="container d-flex justify-content-between align-items-center flex-wrap gap-4">
            <img src="{% static 'reviews/logo.png' %}" alt="Fish The.Box logo" width="100" height="80">
            <p class="mb-0">&copy; 2026 Fish The.Box. All rights reserved.</p>
            <p class="mb-0">Email: <a href="mailto:fishthebox@example.com">fishthebox@example.com</a></p>
            <div class="d-flex gap-3 fs-3">
                <a href="https://github.com/G1org0s/Final-Assesment-Internet-Programming.git" aria-label="GitHub">
                    <i class="bi bi-github"></i>
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
